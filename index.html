<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humanizer — Remove the robot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f2ec;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  header { margin-bottom: 36px; text-align: center; }

  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #111;
  }

  header h1 span { color: #c0392b; }

  header p {
    margin-top: 8px;
    font-size: 1rem;
    color: #666;
    font-style: italic;
  }

  .badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    background: #eafaf1;
    color: #27ae60;
    border: 1px solid #a9dfbf;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: monospace;
    letter-spacing: 0.04em;
  }

  .sample-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    justify-content: center;
  }

  .sample-btn {
    padding: 6px 14px;
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    color: #666;
    transition: border-color 0.15s, color 0.15s;
  }

  .sample-btn:hover { border-color: #c0392b; color: #c0392b; }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
  }

  .panel { display: flex; flex-direction: column; }

  .panel-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #c0392b;
    flex-shrink: 0;
  }

  .panel-label .dot.green { background: #27ae60; }

  textarea {
    flex: 1;
    min-height: 300px;
    padding: 18px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #fff;
    font-family: 'Georgia', serif;
    font-size: 0.97rem;
    line-height: 1.65;
    color: #1a1a1a;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #c0392b; }

  .output-box {
    flex: 1;
    min-height: 300px;
    padding: 18px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #fff;
    font-family: 'Georgia', serif;
    font-size: 0.97rem;
    line-height: 1.65;
    color: #1a1a1a;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
    overflow-y: auto;
  }

  .output-box.streaming { border-color: #27ae60; }

  .placeholder-text {
    color: #bbb;
    font-style: italic;
    pointer-events: none;
    user-select: none;
  }

  .changes-section {
    margin-top: 20px;
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }

  .changes-section.visible { display: block; }

  .changes-header {
    padding: 12px 18px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }

  .changes-header:hover { background: #f5f5f5; }

  .changes-body {
    padding: 16px 18px;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #444;
    display: none;
  }

  .changes-body.open { display: block; }
  .changes-body ul { padding-left: 18px; }
  .changes-body li { margin-bottom: 4px; }

  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-humanize {
    padding: 13px 32px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .btn-humanize:hover:not(:disabled) { background: #a93226; }
  .btn-humanize:active:not(:disabled) { transform: scale(0.98); }
  .btn-humanize:disabled { background: #e0a09a; cursor: not-allowed; }

  .btn-clear {
    padding: 13px 20px;
    background: transparent;
    color: #999;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-clear:hover { color: #555; border-color: #aaa; }

  .btn-copy {
    padding: 13px 20px;
    background: transparent;
    color: #27ae60;
    border: 1.5px solid #27ae60;
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-left: auto;
    display: none;
  }

  .btn-copy:hover { background: #eafaf1; }

  .status-msg {
    font-size: 0.88rem;
    color: #999;
    font-style: italic;
  }

  .status-msg.error { color: #c0392b; font-style: normal; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #27ae60;
    vertical-align: text-bottom;
    animation: blink 0.8s infinite;
    margin-left: 1px;
  }

  footer {
    margin-top: 48px;
    text-align: center;
    font-size: 0.8rem;
    color: #bbb;
  }

  footer a { color: #bbb; text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Human<span>izer</span></h1>
    <p>Paste AI-generated text. Get writing that sounds like a person wrote it.</p>
    <span class="badge">✦ Free &amp; Open Source</span>
  </header>

  <div class="sample-bar">
    <button class="sample-btn" onclick="loadSample('email')">Corporate email</button>
    <button class="sample-btn" onclick="loadSample('essay')">Essay intro</button>
    <button class="sample-btn" onclick="loadSample('bio')">LinkedIn bio</button>
    <button class="sample-btn" onclick="loadSample('review')">Product review</button>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label"><span class="dot"></span> AI slop goes in</div>
      <textarea id="inputText" placeholder="Paste your AI-generated text here…&#10;&#10;Tip: the more robotic, the more dramatic the transformation."></textarea>
    </div>
    <div class="panel">
      <div class="panel-label"><span class="dot green"></span> Human writing comes out</div>
      <div class="output-box" id="outputBox">
        <span class="placeholder-text">Your humanized text will appear here…</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn-humanize" id="humanizeBtn" onclick="humanize()">Humanize →</button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
    <span class="status-msg" id="statusMsg"></span>
    <button class="btn-copy" id="copyBtn" onclick="copyOutput()">Copy result</button>
  </div>

  <div class="changes-section" id="changesSection">
    <div class="changes-header" onclick="toggleChanges()">
      <span>What changed</span>
      <span id="chevron">▼</span>
    </div>
    <div class="changes-body" id="changesBody"></div>
  </div>

  <footer>
    Open source · <a href="https://github.com/YOUR_USERNAME/humanizer" target="_blank">View on GitHub</a> · Powered by Gemini 2.0 Flash (free)
  </footer>
</div>

<script>
const SAMPLES = {
  email: `I hope this message finds you well! I wanted to reach out to touch base regarding our upcoming synergy opportunities. As we navigate the ever-evolving landscape of our industry, it's crucial that we leverage our core competencies to drive impactful outcomes.

Going forward, I believe it's vital that we align our cross-functional teams to ensure seamless collaboration and foster an environment of innovation. This represents a pivotal moment for our organization, and I'm excited about the groundbreaking work we'll accomplish together.

Please don't hesitate to reach out if you have any questions or would like to discuss this further. Looking forward to connecting!`,

  essay: `In today's rapidly evolving technological landscape, artificial intelligence stands as a testament to human ingenuity and innovation, marking a pivotal moment in the history of civilization. AI is not merely a tool; it serves as a catalyst for transformation, fundamentally reshaping how we live, work, and interact with the world around us. From healthcare to finance, from education to entertainment, the profound implications of this groundbreaking technology underscore its vital role in shaping our collective future.

Industry experts have noted that adoption has accelerated significantly, reflecting broader trends in digital transformation. It is important to note that while challenges remain, the future looks bright as we continue this journey toward excellence and innovation.`,

  bio: `Hi there! I'm a passionate and results-driven professional with a proven track record of delivering impactful solutions in today's dynamic business environment. I thrive on leveraging cutting-edge technologies to drive meaningful change and foster collaborative relationships that yield transformative outcomes.

With over a decade of experience in the rapidly evolving tech sector, I have cultivated a deep expertise in end-to-end project management, cross-functional team leadership, and data-driven decision-making. My commitment to excellence and innovation has enabled me to consistently deliver high-quality results that exceed expectations and contribute to organizational success.`,

  review: `This product truly stands as a testament to exceptional craftsmanship and innovative design. It has fundamentally transformed my daily routine, enhancing my overall quality of life in ways I never thought possible. The groundbreaking features showcase the manufacturer's deep commitment to customer satisfaction and continuous improvement.

I was initially skeptical, but after thorough use, I can confidently say this product represents a pivotal shift in its category. Industry observers have noted its superiority, and the vibrant community of users reflects its enduring appeal. Highly recommend to anyone looking to elevate their experience!`
};

function loadSample(key) {
  document.getElementById('inputText').value = SAMPLES[key];
}

function clearAll() {
  document.getElementById('inputText').value = '';
  const ob = document.getElementById('outputBox');
  ob.innerHTML = '<span class="placeholder-text">Your humanized text will appear here…</span>';
  ob.classList.remove('streaming');
  document.getElementById('changesSection').classList.remove('visible');
  document.getElementById('changesBody').innerHTML = '';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('statusMsg').textContent = '';
  outputText = '';
}

let outputText = '';

function copyOutput() {
  navigator.clipboard.writeText(outputText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy result', 1800);
  });
}

function toggleChanges() {
  const body = document.getElementById('changesBody');
  const chev = document.getElementById('chevron');
  body.classList.toggle('open');
  chev.textContent = body.classList.contains('open') ? '▲' : '▼';
}

async function humanize() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) {
    document.getElementById('statusMsg').textContent = 'Paste some text first.';
    return;
  }

  const btn = document.getElementById('humanizeBtn');
  const ob = document.getElementById('outputBox');
  const statusMsg = document.getElementById('statusMsg');

  btn.disabled = true;
  statusMsg.textContent = 'Working…';
  statusMsg.className = 'status-msg';
  ob.classList.add('streaming');
  ob.innerHTML = '<span class="cursor"></span>';
  document.getElementById('changesSection').classList.remove('visible');
  document.getElementById('copyBtn').style.display = 'none';
  outputText = '';

  try {
    const response = await fetch('/api/humanize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: input }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            fullContent += evt.delta.text;
            renderStream(ob, fullContent);
          }
        } catch {}
      }
    }

    const humanizedMatch = fullContent.match(/<humanized>([\s\S]*?)<\/humanized>/);
    const changesMatch = fullContent.match(/<changes>([\s\S]*?)<\/changes>/);

    outputText = humanizedMatch ? humanizedMatch[1].trim() : fullContent.trim();
    const changesText = changesMatch ? changesMatch[1].trim() : '';

    ob.classList.remove('streaming');
    ob.textContent = outputText;
    statusMsg.textContent = '';
    document.getElementById('copyBtn').style.display = 'block';

    if (changesText) {
      const changesBody = document.getElementById('changesBody');
      const items = changesText.split('\n').filter(l => l.trim()).map(l =>
        '<li>' + l.replace(/^[-•*]\s*/, '').trim() + '</li>'
      ).join('');
      changesBody.innerHTML = '<ul>' + items + '</ul>';
      document.getElementById('changesSection').classList.add('visible');
    }

  } catch (err) {
    ob.classList.remove('streaming');
    ob.textContent = '';
    statusMsg.textContent = 'Error: ' + err.message;
    statusMsg.className = 'status-msg error';
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function renderStream(ob, fullContent) {
  const humanizedMatch = fullContent.match(/<humanized>([\s\S]*)/);
  let display = '';
  if (humanizedMatch) {
    display = humanizedMatch[1]
      .replace(/<\/humanized>[\s\S]*/, '')
      .replace(/<changes>[\s\S]*/, '');
  }
  ob.textContent = display;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  ob.appendChild(cursor);
}
</script>
</body>
</html>
